name: scene-classification-regression

on:
  pull_request:
    paths:
      - "tests/scene_classification_evaluation.test.ts"
      - "tests/fixtures/scene_classification_benchmark.json"
      - "tests/fixtures/scene_classification_baseline.json"
      - "src-tauri/src/services/ai_pipeline/scene_classifier.rs"
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run scene classification regression test
        run: node --import tsx --test tests/scene_classification_evaluation.test.ts
